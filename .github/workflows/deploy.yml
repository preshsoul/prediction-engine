name: Build & Deploy Predictions

on:
  push:
    branches: [main]

  # Run every 6 hours (fits free tier: ~4 runs/day x 4 sports = 16 req/day)
  schedule:
    - cron: '0 */6 * * *'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run live prediction pipeline
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: python run_live.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
